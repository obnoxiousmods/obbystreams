name: Bug report
description: Report a reproducible Obbystreams problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, uv, nginx, ArangoDB, ffmpeg.
