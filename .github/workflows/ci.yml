name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy app.py
      - name: Compile
        run: uv run python -m py_compile app.py tools/bootstrap_arango.py

  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Validate example YAML
        run: |
          uv run --with pyyaml python - <<'PY'
          import yaml
          with open("examples/obbystreams.example.yaml", "r", encoding="utf-8") as f:
              data = yaml.safe_load(f)
          assert data["stream"]["command"]
          assert data["arangodb"]["database"] == "obbystreams"
          PY
