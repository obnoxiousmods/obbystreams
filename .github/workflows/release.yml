name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build source archive
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix=obbystreams/ HEAD > dist/obbystreams-source.tar.gz
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/obbystreams-source.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
